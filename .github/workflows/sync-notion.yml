name: Life OS ↔ Notion 同步

on:
  # ① 手动触发：点按钮 → 打开此页面 → Run workflow
  workflow_dispatch:
    inputs:
      mode:
        description: '同步方向'
        required: true
        type: choice
        default: 'sync'
        options:
          - sync   # 双向全量
          - push   # GitHub → Notion
          - pull   # Notion → GitHub

  # ② GitHub push 自动推送到 Notion（仅在数据文件变更时）
  push:
    branches: [main, master]
    paths:
      - 'public/data/projects.json'
      - 'public/data/okr.json'
      - 'public/data/finance.json'
      - 'public/data/knowledge.json'
      - 'public/data/life.json'

  # ③ 每小时自动从 Notion 拉取（工作时间 08-22）
  schedule:
    - cron: '0 8-22 * * *'   # 北京时间 16:00-次日06:00（UTC+8）

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # pull 模式需要提交 JSON 变更回仓库

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 执行同步
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          MODE="${{ github.event.inputs.mode || 'push' }}"
          # schedule 触发时默认用 pull，push 触发时用 push
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MODE="pull"
          elif [ "${{ github.event_name }}" = "push" ]; then
            MODE="push"
          fi
          echo "🚀 同步模式: $MODE"
          python scripts/ci_sync_notion.py "$MODE"

      - name: 提交拉取结果（仅 pull/sync 模式）
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'pull' || github.event.inputs.mode == 'sync' }}
        run: |
          if [[ -n $(git status --porcelain public/data/) ]]; then
            git config user.name "Life OS Sync Bot"
            git config user.email "sync@life-os.local"
            git add public/data/
            git commit -m "🔄 sync: Notion → Life OS [skip ci]"
            git push
            echo "✅ 变更已提交"
          else
            echo "📭 无变更"
          fi
